name: Rust CI & Release

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc, aarch64-pc-windows-msvc

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build x86_64 Binary
      run: cargo build --release --target x86_64-pc-windows-msvc

    - name: Build ARM64 Binary
      run: cargo build --release --target aarch64-pc-windows-msvc

    - name: Prepare Artifacts
      shell: bash
      run: |
        VERSION=$(grep "^version =" Cargo.toml | head -n 1 | cut -d'"' -f 2)
        mkdir -p dist
        cp target/x86_64-pc-windows-msvc/release/sing-box-gui.exe dist/sing-box-gui-v${VERSION}-windows-amd64.exe
        cp target/aarch64-pc-windows-msvc/release/sing-box-gui.exe dist/sing-box-gui-v${VERSION}-windows-arm64.exe

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sing-box-gui-windows
        path: dist/*

  build-macos:
    name: Build macOS Universal Binary
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-apple-darwin, aarch64-apple-darwin

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build Intel Binary
      run: cargo build --release --target x86_64-apple-darwin

    - name: Build Apple Silicon Binary
      run: cargo build --release --target aarch64-apple-darwin

    - name: Create Universal Binary
      run: |
        VERSION=$(grep "^version =" Cargo.toml | head -n 1 | cut -d'"' -f 2)
        mkdir -p dist
        lipo -create \
          -output dist/sing-box-gui-v${VERSION}-macos-universal \
          target/x86_64-apple-darwin/release/sing-box-gui \
          target/aarch64-apple-darwin/release/sing-box-gui

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sing-box-gui-macos
        path: dist/*

  build-linux-x64:
    name: Build Linux x86_64 Binary
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxft-dev libxext-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl1-mesa-dev libasound2-dev libudev-dev pkg-config libxkbcommon-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev libssl-dev libxdo-dev

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build in Release mode
      run: cargo build --release

    - name: Prepare Artifact
      run: |
        VERSION=$(grep "^version =" Cargo.toml | head -n 1 | cut -d'"' -f 2)
        mkdir -p dist
        cp target/release/sing-box-gui dist/sing-box-gui-v${VERSION}-linux-amd64

    - name: Upload Linux x64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sing-box-gui-linux-x64
        path: dist/*

  build-linux-arm64:
    name: Build Linux ARM64 Binary
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxft-dev libxext-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl1-mesa-dev libasound2-dev libudev-dev pkg-config libxkbcommon-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev libssl-dev libxdo-dev

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build in Release mode
      run: cargo build --release

    - name: Prepare Artifact
      run: |
        VERSION=$(grep "^version =" Cargo.toml | head -n 1 | cut -d'"' -f 2)
        mkdir -p dist
        cp target/release/sing-box-gui dist/sing-box-gui-v${VERSION}-linux-arm64

    - name: Upload Linux ARM64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sing-box-gui-linux-arm64
        path: dist/*

  release:
    name: Create Release & Upload Assets
    needs: [build-windows, build-macos, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract version from Cargo.toml
      id: get_version
      shell: bash
      run: |
        VERSION=$(grep "^version =" Cargo.toml | head -n 1 | cut -d'"' -f 2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: sing-box-gui-windows
        path: dist/

    - name: Download macOS artifacts
      uses: actions/download-artifact@v4
      with:
        name: sing-box-gui-macos
        path: dist/

    - name: Download Linux x64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: sing-box-gui-linux-x64
        path: dist/

    - name: Download Linux ARM64 artifacts
      uses: actions/download-artifact@v4
      with:
        name: sing-box-gui-linux-arm64
        path: dist/

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
